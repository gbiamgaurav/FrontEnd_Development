<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Styling Text with Font Properties</title>
	<link rel="stylesheet" href="./04_styling_text_with_font_properties.css">
</head>
<body>
	<main class="card">
		<h1>Font Properties Example</h1>

		<p class="regular-text">
			This is regular paragraph text with normal weight and comfortable line-height.
		</p>

		<p class="bold-text">
			This line is bold text using a heavier font-weight.
		</p>

		<p class="italic-text">
			This line is italic text using the font-style property.
		</p>

		<p class="spaced-text">
			This line uses letter spacing to spread out the characters.
		</p>
	</main>
</body>
</html>
