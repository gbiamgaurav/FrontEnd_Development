<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Box with Padding and Margin</title>
	<link rel="stylesheet" href="./05_box_with_padding_margin.css">
</head>
<body>
	<main class="wrapper">
		<h1>Padding and Margin Example</h1>

		<p class="note">
			The blue area below is one box. Padding creates space inside the border.
			Margin creates space outside the box.
		</p>

		<div class="box">This is the main box content.</div>

		<div class="next-box">This second box is pushed down using margin.</div>
	</main>
</body>
</html>
