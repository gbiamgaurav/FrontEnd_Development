<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Responsive Flexbox Layout</title>
	<link rel="stylesheet" href="./09_responsive_flexbox_layout.css">
</head>
<body>
	<main class="page">
		<h1>Responsive Flexbox Layout</h1>
		<p class="intro">
			Resize the window: cards stack on small screens and align in rows on wider screens.
		</p>

		<section class="card-container">
			<article class="card">
				<h2>Card One</h2>
				<p>Simple flex item with responsive width behavior.</p>
			</article>

			<article class="card">
				<h2>Card Two</h2>
				<p>Cards wrap automatically when space is limited.</p>
			</article>

			<article class="card">
				<h2>Card Three</h2>
				<p>A media query changes layout for larger screens.</p>
			</article>
		</section>
	</main>
</body>
</html>
