<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Styled Button Example</title>
	<link rel="stylesheet" href="./02_style_button.css">
</head>
<body>
	<main class="container">
		<h1>Button</h1>
		<p>
			Fill out the form and click submit. This page shows a simple styled button
			using only HTML and CSS.
		</p>

		<h5>Enter your details here:</h5>
		<form>
			<label for="name">Name:</label>
			<input id="name" type="text" name="name" placeholder="John Doe">

			<label for="email">Email:</label>
			<input id="email" type="email" name="email" placeholder="john@email.com">

			<label for="phone">Phone Number:</label>
			<input id="phone" type="tel" name="phone" placeholder="1234567890">

			<button type="submit">Submit</button>
		</form>
	</main>
</body>
</html>
