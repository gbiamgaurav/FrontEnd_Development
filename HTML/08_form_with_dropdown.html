
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form with Dropdown Menu</title>
    <style>
        :root {
            --bg-1: #fdf7ec;
            --bg-2: #e9f3ff;
            --card: #ffffff;
            --text: #263247;
            --muted: #6c7a91;
            --accent: #0b63ce;
            --accent-hover: #084aa0;
            --border: #cfd8e6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
        }

        .card {
            width: min(560px, 100%);
            background: var(--card);
            border-radius: 16px;
            padding: clamp(20px, 4vw, 32px);
            box-shadow: 0 14px 32px rgba(35, 50, 80, 0.12);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: clamp(1.4rem, 2.2vw, 1.9rem);
        }

        .subtitle {
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--muted);
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            font-weight: 700;
            margin-bottom: 4px;
            display: block;
        }

        input,
        select,
        button {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            font: inherit;
        }

        input:focus,
        select:focus {
            outline: 3px solid rgba(11, 99, 206, 0.2);
            border-color: var(--accent);
        }

        button {
            margin-top: 6px;
            background: var(--accent);
            color: #ffffff;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Form with Dropdown Menu</h1>
        <p class="subtitle">Fill in your details and choose your course.</p>

        <form>
            <div>
                <label for="fullName">Full Name</label>
                <input id="fullName" type="text" name="fullName" placeholder="Enter your name" required>
            </div>

            <div>
                <label for="email">Email</label>
                <input id="email" type="email" name="email" placeholder="you@example.com" required>
            </div>

            <div>
                <label for="course">Select Course</label>
                <select id="course" name="course" required>
                    <option value="">Choose an option</option>
                    <option value="html">HTML Basics</option>
                    <option value="css">CSS Fundamentals</option>
                    <option value="js">JavaScript Essentials</option>
                </select>
            </div>

            <button type="submit">Submit</button>
        </form>
    </main>
</body>
</html>
