
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background: linear-gradient(140deg, #eef6ff, #f9f3e8);
            color: #23324a;
        }

        .container {
            text-align: center;
            padding: 24px;
        }

        .tooltip-wrap {
            position: relative;
            display: inline-block;
            margin-top: 18px;
            cursor: pointer;
            font-weight: 700;
            color: #0c4fb3;
        }

        .tooltip-text {
            position: absolute;
            left: 50%;
            bottom: 140%;
            transform: translateX(-50%);
            min-width: 220px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #1f2937;
            color: #ffffff;
            font-size: 0.9rem;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform-origin: bottom center;
        }

        .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 7px;
            border-style: solid;
            border-color: #1f2937 transparent transparent transparent;
        }

        .tooltip-wrap:hover .tooltip-text,
        .tooltip-wrap:focus-visible .tooltip-text {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(-4px);
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>ToolTip on Hover Assignment</h1>
        <span class="tooltip-wrap" tabindex="0">
            Hover over this text
            <span class="tooltip-text">This is a tooltip message shown on hover.</span>
        </span>
    </main>
</body>
</html>
